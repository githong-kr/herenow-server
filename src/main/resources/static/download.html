<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HereNow — 앱 다운로드</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f5f0e8 0%, #e8e0d0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      text-align: center;
    }
    .logo {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }
    h1 { font-size: 28px; font-weight: 800; color: #1a1a1a; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 32px; }
    .version-badge {
      display: inline-block;
      background: #f0ecff;
      color: #4f46e5;
      font-size: 12px; font-weight: 600;
      padding: 4px 12px;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    .download-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79,70,229,0.35);
    }
    .download-btn:active { transform: translateY(0); }
    .info { font-size: 12px; color: #aaa; margin-top: 20px; line-height: 1.6; }
    .info a { color: #4f46e5; text-decoration: none; }
    .steps {
      text-align: left;
      background: #faf8f5;
      border-radius: 12px;
      padding: 16px 20px;
      margin: 24px 0;
      font-size: 13px;
      color: #555;
      line-height: 2;
    }
    .steps strong { color: #333; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏠</div>
    <h1>HereNow</h1>
    <p class="subtitle">우리 집 수납 관리 앱</p>
    <span class="version-badge">Preview Build (Dev)</span>
    <div id="last-updated" style="font-size: 11px; color: #aaa; margin-top: -16px; margin-bottom: 24px;">
      최근 업데이트: <!--TIMESTAMP-->2026-04-22 23:24<!--/TIMESTAMP-->
    </div>

    <div class="steps">
      <strong>📱 설치 방법</strong><br>
      1. 아래 버튼을 눌러 APK 다운로드<br>
      2. 알 수 없는 소스 허용 (팝업 안내)<br>
      3. 다운로드된 APK 설치
    </div>

    <a href="/app-builds/herenow-dev.apk" class="download-btn" id="downloadBtn">
      ⬇️ APK 다운로드
    </a>

    <p class="info">
      Android 전용 · 약 134MB<br>
      문의: <a href="mailto:dev@nsnm.xyz">dev@nsnm.xyz</a>
    </p>
  </div>

  <script>
    document.getElementById('downloadBtn').addEventListener('click', function() {
      this.textContent = '⏳ 다운로드 중...';
      setTimeout(() => { this.textContent = '⬇️ APK 다운로드'; }, 5000);
    });
  </script>
</body>
</html>
